name: Build and Test
on:
  push:
    branches: [ main ]
  

jobs:
    build:
        runs-on: ubuntu-latest
        steps:
        - uses: actions/checkout@v2
         
        - name: build frontend
          run: |
            cd frontend
            npm install
            npm run build

        - name: build admin
          run: |
                cd admin
                npm install
                npm run build
    
    deploy:
        needs: build
        runs-on: ubuntu-latest
        
        name: SSh in server and deploy
        steps:
        - name: SSH and deploy
          uses: appleboy/ssh-action@master
          with:
            host: ${{ secrets.SERVER_HOST }}
            username: ${{ secrets.SERVER_USER }}
            key: ${{ secrets.SERVER_SSH_KEY }}
            script: |
              export NVM_DIR="$HOME/.nvm"
              source $NVM_DIR/nvm.sh
              nvm use node
              npm -v
              cd Evalix
              git pull origin main
              cd frontend
              npm install
              npm run build
              sudo rm -rf /var/www/frontend/*
              sudo cp -r dist/* /var/www/frontend/
              cd ../admin
              sudo rm -rf /var/www/admin/*
              sudo cp -r dist/* /var/www/admin/
              cd ../backend 
              npm install
              pm2 restart all

            